<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinate System</title>
    <style style="text/css">
        canvas {
            border: 1px solid black;
        }

        .container {
            display: flex;
            flex-direction: row wrap;
        }

        .manipulations {
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="myCanvas"></canvas>
        <div class="manipulations">
            hide grid
            <input id="hide-grid" type="checkbox"/>
            
            <div style="margin-top: 10px;">
                <span>Scale:</span>
                <input id="my-slider" type="range" min="1" max="10" value="4"/>
            </div>
        </div>
    </div>

    <!-- Import main.js as ES module -->
    <script type="module" src="main.js"></script>
</body>
</html>
